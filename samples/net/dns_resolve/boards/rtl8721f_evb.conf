CONFIG_NET_L2_ETHERNET=y
CONFIG_NET_LOG=y
CONFIG_NET_SHELL=y

# IPv4 address of develop boards
CONFIG_NET_CONFIG_MY_IPV4_ADDR="192.168.3.12"
# IPv4 address of AP
CONFIG_NET_CONFIG_PEER_IPV4_ADDR="192.168.3.1"
# Use local dnsmasq server for testing
CONFIG_DNS_SERVER1=""
CONFIG_DNS_SERVER2="192.168.3.1:53"

CONFIG_NET_CORE_LOG_LEVEL_DBG=n
CONFIG_NET_STATISTICS=n
# To avoid loss of UART printing information
CONFIG_LOG_BUFFER_SIZE=16384
CONFIG_NET_IPV4_LOG_LEVEL_DBG=n




