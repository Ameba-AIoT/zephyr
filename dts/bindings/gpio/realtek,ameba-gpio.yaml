description: Realtek Ameba GPIO controller

compatible: "realtek,ameba-gpio"

include:
  - gpio-controller.yaml
  - base.yaml
  - realtek,ameba-pmu.yaml

properties:
  reg:
    required: true

  interrupts:
    required: true

  port:
    type: int
    required: true
    description: |
      GPIO port index of the controller (e.g. 0 for GPIOA, 1 for GPIOB, etc).

  "#gpio-cells":
    const: 2

gpio-cells:
  - pin
  - flags
