description: AMEBA Ethernet

compatible: "realtek,ameba-eth"

include: [pinctrl-device.yaml, ethernet-controller.yaml]

properties:
  pinctrl-names:
    required: true

  phy-connection-type:
    required: true

  phy-handle:
    required: true

  ref-clk-output-gpios:
    type: phandle-array
    description: |
      GPIO to output RMII Clock.
